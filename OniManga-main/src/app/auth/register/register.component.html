<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form (ngSubmit)="onRegister()">
            <div class="form-group">
                <label>Username</label>
                <input [(ngModel)]="userData.username" name="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input [(ngModel)]="userData.email" name="email" type="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Paasword</label>
                <input [(ngModel)]="userData.password" name="password" type="password" required
                    placeholder="Minimum 6 characters">
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <div style="margin-top: 25px; font-size: 14px; color: #777; font-family: sans-serif; text-align: center;">
            Already have an account?
            <a routerLink="/login" style="color: #80CFA9; text-decoration: none; font-weight: bold; cursor: pointer;">
                Login
            </a>
        </div>
    </div>
</div>
